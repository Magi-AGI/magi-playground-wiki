# Nginx location block for the MeTTa Playground sidecar.
#
# Drop this into the server {} block that serves wiki.hyperon.dev, e.g.:
#
#   server {
#       server_name wiki.hyperon.dev;
#       ...
#       include /etc/nginx/snippets/magi-playground.conf;
#   }
#
# Requires the rate-limit zones from nginx-rate-limits.conf to be loaded in
# the http {} block.

location /api/playground/ {
    # Tiered rate limit (plan A-9 / B-7). One zone is skipped per request based
    # on whether _hyperon_session is set — see nginx-rate-limits.conf.
    limit_req zone=magi_playground_user burst=10 nodelay;
    limit_req zone=magi_playground_ip   burst=5  nodelay;
    limit_req_status 429;

    proxy_pass http://127.0.0.1:8765/api/playground/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Forward the session cookie so the sidecar can detect auth tier.
    proxy_set_header Cookie            $http_cookie;

    # No SSE on this lane — buffering is fine. Keep small read timeout above
    # the 5s default eval budget (plan I-5) with margin for Docker startup.
    proxy_connect_timeout 5s;
    proxy_send_timeout    15s;
    proxy_read_timeout    15s;

    # Source bodies are small (max ~64KB).
    client_max_body_size 128k;

    add_header X-Playground-Backend "magi-playground-wiki" always;
}
