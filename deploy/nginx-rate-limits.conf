# Rate-limit zones for the MeTTa Playground sidecar (plan A-9 / B-7).
#
# Include this file inside the http {} block of nginx.conf, e.g.:
#
#   http {
#       include /etc/nginx/conf.d/magi-playground-rate-limits.conf;
#       ...
#   }
#
# Tiered limits (per right-column plan):
#   - Signed-in users (cookie present): 60 evals/user/min.
#   - Anonymous (no cookie):            30 evals/IP/min.
#
# Empty key skips the limit, so the `map` directives route each request to
# exactly one zone based on the _hyperon_session cookie.

map $cookie__hyperon_session $magi_playground_user_key {
    default "";
    "~."    $cookie__hyperon_session;
}

map $cookie__hyperon_session $magi_playground_ip_key {
    default $binary_remote_addr;
    "~."    "";
}

limit_req_zone $magi_playground_user_key zone=magi_playground_user:10m rate=60r/m;
limit_req_zone $magi_playground_ip_key   zone=magi_playground_ip:10m   rate=30r/m;
